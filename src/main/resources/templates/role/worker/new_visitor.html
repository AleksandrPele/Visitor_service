<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Добавить посетителя</title>
</head>
<body>
<a data-th-href="@{/role/worker/list}">&larr; К списку посетителей</a>
<h1>Добавление посетителя</h1>
<form method="post" data-th-action="@{/role/worker/create}">
    <label>
         ФИО:<br>
        <input type="text" name="fullName">
    </label><br>
    <label>
        Организация:<br>
        <input type="text" name="organization">
    </label><br>
    <label>
        Отдел:<br>
        <input type="text" name="department">
    </label><br>
    <label>
        Дата посещения:<br>
        <input type="text" name="date">
    </label><br><br>
    <button type="submit">Добавить</button>
</form>
</body>
</html>
